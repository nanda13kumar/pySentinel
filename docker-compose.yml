# ==============================================================================
#  PySentinel — docker-compose.yml
#  Developer usage: docker compose run --rm pysentinel nsepython --html
# ==============================================================================
services:
  pysentinel:
    build:
      context: .
      dockerfile: Dockerfile
    image: pysentinel:2.1
    volumes:
      - ./reports:/home/scanner/pysentinel_reports
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
